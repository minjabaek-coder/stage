<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>에디터 캔바화 — 인터랙티브 프로토타입 (Stage 1)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ecedef; --panel:#fff; --line:#e4e4e7; --line2:#d4d4d8;
  --ink:#18181b; --muted:#71717a; --muted2:#a1a1aa;
  --sel:#2563eb; --sel-bg:rgba(37,99,235,.10); --guide:#ec4899;
  --gold:#c4a35a; --gold-deep:#6f5c24; --canvas-bg:#dedcd9; --page:#fbf8f3;
  --sans:'Noto Sans KR',sans-serif; --serif:'Noto Serif KR',serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
.app{display:flex;flex-direction:column;height:100vh}

/* 상단바 */
.topbar{height:50px;flex:0 0 50px;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line)}
.topbar .crumb{font-weight:700}.topbar .iss{color:var(--muted);font-weight:400;font-size:12px;margin-left:5px}
.topbar .save{font-family:var(--mono);font-size:10px;color:#16a34a;display:flex;align-items:center;gap:5px;margin-left:6px}
.topbar .save .dot{width:6px;height:6px;border-radius:50%;background:#16a34a}
.topbar .sp{flex:1}
.tb{border:1px solid var(--line2);background:#fff;border-radius:7px;height:32px;min-width:32px;padding:0 9px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;color:var(--ink)}
.tb:disabled{opacity:.35;cursor:default}
.tb.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.zoom{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:7px;height:32px;overflow:hidden}
.zoom button{border:0;background:#fff;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--muted)}
.zoom .zv{font-family:var(--mono);font-size:11px;width:44px;text-align:center}

.main{flex:1;display:flex;min-height:0}

/* 좌: 도구 레일 + 추가 패널 */
.rail{flex:0 0 64px;background:#1c1b1b;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px}
.rail button{width:48px;height:50px;border:0;background:transparent;color:rgba(255,255,255,.6);border-radius:9px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.rail button .ic{font-size:18px}
.rail button:hover{background:rgba(255,255,255,.08);color:#fff}
.rail button.on{background:rgba(255,255,255,.14);color:#fff}

/* 도형 팝오버 */
.pop{position:absolute;z-index:50;background:#fff;border:1px solid var(--line2);border-radius:10px;box-shadow:0 14px 36px rgba(0,0,0,.18);padding:10px}
.pop .ttl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.shapegrid{display:grid;grid-template-columns:repeat(3,40px);gap:8px}
.shapegrid button{width:40px;height:40px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.shapegrid .pv{pointer-events:none}

/* 중앙 스테이지 */
.stage{flex:1;position:relative;background:var(--canvas-bg);overflow:auto;display:flex;align-items:center;justify-content:center}
.canvas-wrap{position:relative}
.canvas{background:var(--page);box-shadow:0 12px 45px rgba(0,0,0,.22);position:relative;overflow:hidden;transform-origin:center center}
.blk{position:absolute;cursor:move;user-select:none}
.blk.text{padding:0;overflow:hidden}
.blk .bk{font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep)}
.blk.image{background:linear-gradient(135deg,#3a4a5a,#1d2733);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-family:var(--mono);font-size:10px}
.blk.shape{}
.blk.sel{outline:1.5px solid var(--sel);outline-offset:0}
.blk.multi{outline:1.5px solid rgba(37,99,235,.6)}
.h{position:absolute;width:11px;height:11px;background:#fff;border:1.5px solid var(--sel);border-radius:2px;z-index:30}
.h.nw{left:-6px;top:-6px;cursor:nwse-resize}.h.ne{right:-6px;top:-6px;cursor:nesw-resize}
.h.sw{left:-6px;bottom:-6px;cursor:nesw-resize}.h.se{right:-6px;bottom:-6px;cursor:nwse-resize}
.h.n{left:calc(50% - 6px);top:-6px;cursor:ns-resize}.h.s{left:calc(50% - 6px);bottom:-6px;cursor:ns-resize}
.h.w{left:-6px;top:calc(50% - 6px);cursor:ew-resize}.h.e{right:-6px;top:calc(50% - 6px);cursor:ew-resize}
.gbbox{position:absolute;border:1px dashed var(--sel);pointer-events:none;z-index:25}
.guide{position:absolute;background:var(--guide);z-index:40;pointer-events:none}
.guide.v{width:1px}.guide.h{height:1px}
.marquee{position:absolute;border:1px solid var(--sel);background:var(--sel-bg);z-index:35;pointer-events:none}
/* 플로팅 텍스트 툴바 */
.floatbar{position:absolute;display:inline-flex;gap:1px;background:#1c1b1b;border-radius:9px;padding:4px;box-shadow:0 10px 24px rgba(0,0,0,.32);z-index:60}
.floatbar button{border:0;background:transparent;color:#fff;font-size:13px;padding:4px 8px;border-radius:5px;cursor:pointer;opacity:.85}
.floatbar button.on,.floatbar button:hover{background:rgba(255,255,255,.16);opacity:1}
.floatbar .sw{width:15px;height:15px;border-radius:50%;border:1px solid rgba(255,255,255,.45);padding:0}
.floatbar .sepv{width:1px;background:rgba(255,255,255,.22);margin:3px 2px}

/* 우: 속성/레이어 */
.inspector{flex:0 0 268px;background:#fff;border-left:1px solid var(--line);overflow:auto;padding:14px}
.inspector h4{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.typetag{background:var(--sel-bg);color:var(--sel);border-radius:4px;padding:1px 7px;font-size:10px}
.grp{border-top:1px solid var(--line);padding:12px 0}.grp:first-of-type{border-top:0;padding-top:0}
.glb{font-size:11px;color:var(--muted);margin-bottom:7px}
.xy{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fld{display:flex;align-items:center;gap:5px;border:1px solid var(--line2);border-radius:6px;padding:5px 8px}
.fld .k{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.fld input{border:0;outline:0;width:100%;font-size:12px;font-family:var(--mono);background:transparent;color:var(--ink)}
.fld .u{font-size:10px;color:var(--muted2)}
.iconrow{display:flex;gap:4px}.iconrow button{flex:1;border:1px solid var(--line2);background:#fff;border-radius:6px;padding:6px 0;cursor:pointer;font-size:12px;color:var(--muted)}.iconrow button:hover{border-color:var(--sel);color:var(--sel)}
.swrow{display:flex;gap:6px;flex-wrap:wrap}.swrow button{width:24px;height:24px;border-radius:6px;border:1px solid var(--line2);cursor:pointer}.swrow button.on{outline:2px solid var(--sel);outline-offset:1px}
.seg{display:flex;border:1px solid var(--line2);border-radius:6px;overflow:hidden}.seg button{flex:1;border:0;background:#fff;padding:6px 0;font-size:11px;cursor:pointer;color:var(--muted)}.seg button.on{background:var(--sel);color:#fff}
.layer{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;cursor:pointer}
.layer:hover{background:#f4f4f5}.layer.on{background:var(--sel-bg)}
.layer .ico{width:16px;text-align:center;color:var(--muted)}.layer .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.layer .x{color:var(--muted2)}
.empty{color:var(--muted);font-size:12px;line-height:1.6}

/* 하단 페이지 스트립 */
.pages{flex:0 0 104px;background:var(--panel);border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;overflow-x:auto}
.pthumb{flex:0 0 auto;position:relative;cursor:pointer;text-align:center}
.pthumb .fr{width:54px;height:81px;background:var(--page);border:1px solid var(--line2);border-radius:6px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pthumb.on .fr{border-color:var(--sel);box-shadow:0 0 0 2px var(--sel-bg)}
.pthumb .pn{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px}
.pthumb .more{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:4px;background:rgba(255,255,255,.92);border:1px solid var(--line);font-size:10px;color:var(--muted);display:none;align-items:center;justify-content:center}
.pthumb:hover .more{display:flex}
.addpage{flex:0 0 auto;width:54px;height:81px;border:1px dashed var(--line2);border-radius:6px;background:#fafafa;color:var(--muted);font-size:20px;cursor:pointer}
.addpage:hover{border-color:var(--sel);color:var(--sel)}
.ctx{position:fixed;z-index:80;background:#fff;border:1px solid var(--line2);border-radius:9px;box-shadow:0 14px 34px rgba(0,0,0,.18);padding:5px;min-width:172px;font-size:12px}
.ctx div{padding:7px 9px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;gap:14px}
.ctx div:hover{background:#f4f4f5}.ctx div.danger{color:#dc2626}.ctx .kbd{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.ctx .sep{height:1px;background:var(--line);margin:4px 0;padding:0}
.hint{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);background:rgba(28,27,27,.92);color:#fff;font-size:11px;padding:6px 12px;border-radius:8px;z-index:90;pointer-events:none;opacity:0;transition:opacity .2s}
.hint.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="crumb">매거진 편집<span class="iss">· STAGE Issue 40 (구성형)</span></span>
    <span class="save"><span class="dot"></span>저장됨</span>
    <span class="sp"></span>
    <button class="tb" id="undo" title="실행취소 ⌘Z">↶</button>
    <button class="tb" id="redo" title="다시실행 ⌘⇧Z">↷</button>
    <span class="zoom"><button id="zout">−</button><span class="zv" id="zval">100%</span><button id="zin">＋</button><button id="zfit" title="화면 맞춤">⤢</button></span>
    <button class="tb">미리보기</button>
    <button class="tb primary">발행하기</button>
  </div>

  <div class="main">
    <nav class="rail" id="rail">
      <button data-tool="select" class="on"><span class="ic">↖</span>선택</button>
      <button data-tool="text"><span class="ic">T</span>텍스트</button>
      <button data-tool="image"><span class="ic">🖼</span>이미지</button>
      <button data-tool="shape"><span class="ic">▭</span>도형</button>
    </nav>

    <div class="stage" id="stage">
      <div class="canvas-wrap" id="wrap">
        <div class="canvas" id="canvas"></div>
      </div>
    </div>

    <aside class="inspector" id="inspector"></aside>
  </div>

  <div class="pages" id="pages"></div>
</div>

<div class="hint" id="hint"></div>

<script>
"use strict";
const BASE_W = 300, BASE_H = 450; // 2:3 캔버스(프로토타입 표시 크기)
const uid = (() => { let n = 0; return () => "b" + (++n) + "_" + Math.floor(performance.now()%100000); })();
const COLORS = ["#1c1b1b","#ffffff","#c4a35a","#1f6f72","#b91c1c","#2563eb"];
const SHAPE_FILL = "#1f6f72";

// ── 상태 ──
function blankBlocks(kind){
  if(kind==="cover") return [
    {id:uid(),type:"shape",shape:"rect",x:0,y:0,w:100,h:44,fill:"#241f1c"},
    {id:uid(),type:"text",x:10,y:54,w:80,h:7,text:"COVER STORY",fontSize:9,color:"#c4a35a",weight:500,kicker:true},
    {id:uid(),type:"text",x:10,y:60,w:80,h:14,text:"무대와<br>AI의 만남",fontSize:30,color:"#1c1b1b",weight:900,serif:true},
  ];
  return [
    {id:uid(),type:"image",x:0,y:0,w:100,h:42},
    {id:uid(),type:"text",x:8,y:48,w:84,h:6,text:"REVIEW",fontSize:9,color:"#6f5c24",weight:500,kicker:true},
    {id:uid(),type:"text",x:8,y:55,w:84,h:9,text:"시간이 빚어낸 기도",fontSize:18,color:"#1c1b1b",weight:900,serif:true},
    {id:uid(),type:"text",x:8,y:68,w:84,h:24,text:"9월 9일, 롯데콘서트홀. 저녁 무대의 조명이 천천히 밝아오를 때…",fontSize:8,color:"#444",weight:400,lh:1.7},
  ];
}
let state = {
  pages: [
    {id:uid(), blocks: blankBlocks("cover")},
    {id:uid(), blocks: blankBlocks("content")},
    {id:uid(), blocks: blankBlocks("content")},
  ],
  cur: 0, sel: [], zoom: 1, tool: "select", clip: null,
};
let editingId = null;
const hist = { past: [], future: [] };
const snap = () => JSON.parse(JSON.stringify(state.pages));
function commit(){ hist.past.push(snap()); if(hist.past.length>100) hist.past.shift(); hist.future.length=0; persistTick(); }
function undo(){ if(!hist.past.length) return; hist.future.push(snap()); state.pages = hist.past.pop(); state.sel=[]; editingId=null; render(); }
function redo(){ if(!hist.future.length) return; hist.past.push(snap()); state.pages = hist.future.pop(); state.sel=[]; editingId=null; render(); }

const page = () => state.pages[state.cur];
const blocks = () => page().blocks;
const byId = (id) => blocks().find(b=>b.id===id);
const maxZ = () => blocks().length;

// ── DOM refs ──
const canvas = document.getElementById("canvas");
const wrap = document.getElementById("wrap");
const stage = document.getElementById("stage");
const inspector = document.getElementById("inspector");
const pagesEl = document.getElementById("pages");
const hintEl = document.getElementById("hint");
let hintT;
function hint(msg){ hintEl.textContent=msg; hintEl.classList.add("show"); clearTimeout(hintT); hintT=setTimeout(()=>hintEl.classList.remove("show"),1400); }
function persistTick(){ /* 자동저장 표시 데모 */ }

// ── 렌더 ──
function applyZoom(){
  canvas.style.width = BASE_W+"px"; canvas.style.height = BASE_H+"px";
  canvas.style.transform = "scale("+state.zoom+")";
  document.getElementById("zval").textContent = Math.round(state.zoom*100)+"%";
}
function blockStyle(b){
  let s = `left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%;`;
  if(b.type==="text"){
    s += `color:${b.color};font-weight:${b.weight||400};font-size:${(b.fontSize||14)}px;line-height:${b.lh||1.25};`;
    s += b.serif?`font-family:var(--serif);`:``;
    s += b.kicker?`font-family:var(--mono);letter-spacing:2px;`:``;
    if(b.italic) s+="font-style:italic;";
    if(b.align) s+="text-align:"+b.align+";";
  }
  if(b.type==="shape"){
    s += `background:${b.fill||SHAPE_FILL};`;
    if(b.shape==="ellipse") s+="border-radius:50%;";
    else if(b.shape==="line"){ s+="background:transparent;"; }
    else s+=`border-radius:${b.radius||4}px;`;
  }
  return s;
}
function render(){
  applyZoom();
  // blocks
  canvas.innerHTML = "";
  blocks().forEach(b=>{
    const el = document.createElement("div");
    el.className = "blk "+b.type+(b.shape?(" shape-"+b.shape):"");
    el.dataset.id = b.id;
    el.setAttribute("style", blockStyle(b));
    if(b.type==="text"){ el.innerHTML = b.text; }
    else if(b.type==="image"){ el.textContent = "이미지"; }
    else if(b.type==="shape" && b.shape==="line"){
      el.innerHTML = '<svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="50" x2="100" y2="50" stroke="'+(b.fill||"#1c1b1b")+'" stroke-width="3" vector-effect="non-scaling-stroke"/></svg>';
    }
    const selected = state.sel.includes(b.id);
    if(selected) el.classList.add(state.sel.length>1?"multi":"sel");
    // 단일 선택 + 비편집 → 핸들
    if(selected && state.sel.length===1 && editingId!==b.id){
      ["nw","n","ne","w","e","sw","s","se"].forEach(d=>{
        const h=document.createElement("div"); h.className="h "+d; h.dataset.dir=d; el.appendChild(h);
      });
    }
    if(editingId===b.id){ el.contentEditable="true"; el.style.cursor="text"; el.style.outline="2px solid var(--sel)"; }
    canvas.appendChild(el);
  });
  // 그룹 바운딩박스(다중)
  if(state.sel.length>1){
    const gb = groupBox(state.sel);
    const box = document.createElement("div"); box.className="gbbox";
    box.style.cssText = `left:${gb.x}%;top:${gb.y}%;width:${gb.w}%;height:${gb.h}%;`;
    canvas.appendChild(box);
  }
  renderInspector();
  renderPages();
  renderFloating();
  document.getElementById("undo").disabled = !hist.past.length;
  document.getElementById("redo").disabled = !hist.future.length;
}

function groupBox(ids){
  const bs = ids.map(byId).filter(Boolean);
  const x = Math.min(...bs.map(b=>b.x)), y = Math.min(...bs.map(b=>b.y));
  const r = Math.max(...bs.map(b=>b.x+b.w)), btm = Math.max(...bs.map(b=>b.y+b.h));
  return {x,y,w:r-x,h:btm-y};
}

// ── 인스펙터 ──
function renderInspector(){
  if(state.sel.length===0){
    inspector.innerHTML = `<h4>속성</h4><p class="empty">블록을 선택하면 속성이 표시됩니다.<br><br>좌측 도구에서 <b>텍스트·이미지·도형</b>을 클릭해 추가하거나, 캔버스에서 드래그로 영역 선택하세요.</p>
    <div class="grp"><div class="glb">페이지 배경</div><div class="swrow">${["#fbf8f3","#ffffff","#111111","#241f1c"].map(c=>`<button style="background:${c}"></button>`).join("")}</div></div>
    ${layersHTML()}`;
    return;
  }
  if(state.sel.length>1){
    inspector.innerHTML = `<h4>속성 <span class="typetag">${state.sel.length}개 선택</span></h4>
      <div class="grp"><div class="glb">정렬 (선택 영역 기준)</div><div class="iconrow"><button data-al="l">⇤</button><button data-al="cx">⤬</button><button data-al="r">⇥</button><button data-al="t">⤒</button><button data-al="cy">↕</button><button data-al="b">⤓</button></div></div>
      <div class="grp"><div class="glb">분배</div><div class="iconrow"><button data-dist="x">↔ 가로</button><button data-dist="y">↕ 세로</button></div></div>
      <div class="grp"><div class="glb">그룹</div><div class="iconrow"><button data-act="group">⧉ 그룹</button><button data-act="dup">⧉ 복제</button><button data-act="del" style="color:#dc2626">🗑 삭제</button></div></div>
      ${layersHTML()}`;
    return;
  }
  const b = byId(state.sel[0]); if(!b) return;
  const tname = b.type==="text"?"텍스트":b.type==="image"?"이미지":"도형";
  let typeUI = "";
  if(b.type==="text"){
    typeUI = `<div class="grp"><div class="glb">텍스트</div>
      <div class="xy"><div class="fld"><span class="k">크기</span><input data-p="fontSize" value="${b.fontSize||14}"><span class="u">px</span></div>
      <div class="seg" data-seg="align">${["left","center","right"].map(a=>`<button data-align="${a}" class="${(b.align||'left')===a?'on':''}">${a==='left'?'⬅':a==='center'?'↔':'➡'}</button>`).join("")}</div></div>
      <div class="glb" style="margin-top:8px">글자색</div><div class="swrow">${COLORS.map(c=>`<button data-color="${c}" class="${b.color===c?'on':''}" style="background:${c}"></button>`).join("")}</div>
      <div class="iconrow" style="margin-top:8px"><button data-p2="weight" data-v="${b.weight===900?400:900}" class="${b.weight===900?'on':''}"><b>굵게</b></button><button data-p2="italic" data-v="${b.italic?0:1}" class="${b.italic?'on':''}"><i>기울임</i></button></div></div>`;
  } else if(b.type==="image"){
    typeUI = `<div class="grp"><div class="glb">이미지</div>
      <div class="seg"><button class="on">채움(cover)</button><button>맞춤(contain)</button></div>
      <p class="empty" style="margin-top:8px">＊ "이미지"와 "이미지 프레임"을 통합 — 추가는 한 종류, <b>채움/맞춤</b>은 여기 속성으로.</p>
      <div class="iconrow" style="margin-top:8px"><button>📤 업로드/교체</button></div></div>`;
  } else {
    typeUI = `<div class="grp"><div class="glb">도형 스타일</div>
      <div class="glb">채움색</div><div class="swrow">${COLORS.map(c=>`<button data-fill="${c}" class="${b.fill===c?'on':''}" style="background:${c}"></button>`).join("")}</div>
      ${b.shape!=='line'?`<div class="xy" style="margin-top:8px"><div class="fld"><span class="k">모서리</span><input data-p="radius" value="${b.radius||0}"><span class="u">px</span></div><div></div></div>`:''}</div>`;
  }
  inspector.innerHTML = `<h4>속성 <span class="typetag">${tname}${b.shape?(" · "+({rect:'사각형',ellipse:'원',line:'선'}[b.shape])):""}</span></h4>
    <div class="grp"><div class="glb">위치 · 크기 (% · 상대단위)</div>
      <div class="xy">
        <div class="fld"><span class="k">X</span><input data-p="x" value="${round(b.x)}"><span class="u">%</span></div>
        <div class="fld"><span class="k">Y</span><input data-p="y" value="${round(b.y)}"><span class="u">%</span></div>
        <div class="fld"><span class="k">W</span><input data-p="w" value="${round(b.w)}"><span class="u">%</span></div>
        <div class="fld"><span class="k">H</span><input data-p="h" value="${round(b.h)}"><span class="u">%</span></div>
      </div></div>
    <div class="grp"><div class="glb">정렬 (캔버스)</div><div class="iconrow"><button data-al1="l">⇤</button><button data-al1="cx">⤬</button><button data-al1="r">⇥</button><button data-al1="t">⤒</button><button data-al1="cy">↕</button><button data-al1="b">⤓</button></div></div>
    <div class="grp"><div class="glb">레이어 · 동작</div><div class="iconrow"><button data-act="front">맨앞</button><button data-act="back">맨뒤</button><button data-act="dup">복제</button><button data-act="del" style="color:#dc2626">삭제</button></div></div>
    ${typeUI}
    ${layersHTML()}`;
}
function layersHTML(){
  const items = blocks().slice().reverse().map(b=>{
    const ic = b.type==="text"?"T":b.type==="image"?"▦":(b.shape==="ellipse"?"○":b.shape==="line"?"—":"▭");
    const nm = b.type==="text"?(b.text||"").replace(/<[^>]+>/g," ").slice(0,14):(b.type==="image"?"이미지":({rect:"사각형",ellipse:"원",line:"선"}[b.shape]));
    return `<div class="layer ${state.sel.includes(b.id)?'on':''}" data-layer="${b.id}"><span class="ico">${ic}</span><span class="nm">${nm||"블록"}</span><span class="x">⋯</span></div>`;
  }).join("");
  return `<div class="grp"><div class="glb">레이어</div>${items}</div>`;
}
const round = (n)=>Math.round(n*10)/10;

// ── 페이지 스트립 ──
function miniHTML(p){
  return p.blocks.map(b=>{
    if(b.type==="image") return `<div style="position:absolute;left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%;background:linear-gradient(135deg,#3a4a5a,#1d2733)"></div>`;
    if(b.type==="shape") return `<div style="position:absolute;left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%;background:${b.fill||SHAPE_FILL};${b.shape==='ellipse'?'border-radius:50%':''}"></div>`;
    return `<div style="position:absolute;left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${Math.max(3,b.h)}%;background:#cfc7ba;border-radius:1px"></div>`;
  }).join("");
}
function renderPages(){
  let html = state.pages.map((p,i)=>`<div class="pthumb ${i===state.cur?'on':''}" data-page="${i}"><div class="fr">${miniHTML(p)}</div><div class="pn">${i+1}</div><div class="more" data-pmore="${i}">⋯</div></div>`).join("");
  html += `<button class="addpage" id="addpage" title="현재 페이지 다음에 추가">＋</button>`;
  pagesEl.innerHTML = html;
}

// ── 플로팅 텍스트 툴바 ──
function renderFloating(){
  document.querySelectorAll(".floatbar").forEach(e=>e.remove());
  if(state.sel.length!==1) return;
  const b = byId(state.sel[0]); if(!b || b.type!=="text") return;
  const bar = document.createElement("div"); bar.className="floatbar";
  bar.innerHTML = `<button data-fb="weight" class="${b.weight===900?'on':''}"><b>B</b></button>
    <button data-fb="italic" class="${b.italic?'on':''}"><i>I</i></button>
    <span class="sepv"></span>${COLORS.slice(0,4).map(c=>`<button class="sw" data-fbc="${c}" style="background:${c}"></button>`).join("")}
    <span class="sepv"></span><button data-fb="edit">✎ 편집</button>`;
  wrap.appendChild(bar);
  // 위치: 블록 상단 위
  const cr = canvas.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  const bx = cr.left + (b.x/100)*cr.width, by = cr.top + (b.y/100)*cr.height;
  bar.style.left = (bx - wr.left) + "px";
  bar.style.top = Math.max(0,(by - wr.top) - 40) + "px";
}

// ── 좌표 헬퍼 ──
function cRect(){ return canvas.getBoundingClientRect(); }
function pxToPct(dx,dy){ const r=cRect(); return {x:dx/r.width*100, y:dy/r.height*100}; }
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

// ── 추가 ──
function addBlock(kind, shape){
  let b;
  if(kind==="text") b={id:uid(),type:"text",x:25,y:44,w:50,h:8,text:"텍스트를 입력하세요",fontSize:16,color:"#1c1b1b",weight:400};
  else if(kind==="image") b={id:uid(),type:"image",x:25,y:30,w:50,h:34};
  else b={id:uid(),type:"shape",shape:shape,x:30,y:40,w:40,h:(shape==="line"?6:18),fill:SHAPE_FILL,radius:shape==="rect"?4:0};
  blocks().push(b); state.sel=[b.id]; commit(); render();
  hint((kind==="text"?"텍스트":kind==="image"?"이미지":"도형")+" 추가됨 — 드래그로 이동, 핸들로 크기 조절");
}

// ── 정렬/분배/z ──
function alignTo(ids, mode, box){
  ids.map(byId).forEach(b=>{
    if(mode==="l") b.x=box.x; else if(mode==="r") b.x=box.x+box.w-b.w; else if(mode==="cx") b.x=box.x+(box.w-b.w)/2;
    if(mode==="t") b.y=box.y; else if(mode==="b") b.y=box.y+box.h-b.h; else if(mode==="cy") b.y=box.y+(box.h-b.h)/2;
  });
}
function distribute(ids, axis){
  const bs = ids.map(byId).sort((a,b)=> axis==="x"? a.x-b.x : a.y-b.y);
  if(bs.length<3) return;
  const k = axis==="x"?"x":"y", sz = axis==="x"?"w":"h";
  const start = bs[0][k], end = bs[bs.length-1][k]+bs[bs.length-1][sz];
  const total = bs.reduce((s,b)=>s+b[sz],0); const gap=(end-start-total)/(bs.length-1);
  let pos=start; bs.forEach(b=>{ b[k]=pos; pos+=b[sz]+gap; });
}

// ── 스마트 가이드 스냅 ──
function clearGuides(){ canvas.querySelectorAll(".guide").forEach(e=>e.remove()); }
function drawGuide(axis,pos){ const g=document.createElement("div"); g.className="guide "+axis; if(axis==="v"){g.style.left=pos+"%";g.style.top=0;g.style.bottom=0;} else {g.style.top=pos+"%";g.style.left=0;g.style.right=0;} canvas.appendChild(g); }
const SNAP=1.6;
function snapMove(b, others){
  clearGuides();
  const targetsX=[0,50,100], targetsY=[0,50,100];
  others.forEach(o=>{ targetsX.push(o.x,o.x+o.w/2,o.x+o.w); targetsY.push(o.y,o.y+o.h/2,o.y+o.h); });
  const ex=[b.x,b.x+b.w/2,b.x+b.w], ey=[b.y,b.y+b.h/2,b.y+b.h];
  for(const t of targetsX){ for(let i=0;i<3;i++){ if(Math.abs(ex[i]-t)<SNAP){ b.x += t-ex[i]; drawGuide("v",t); ex[0]=b.x;ex[1]=b.x+b.w/2;ex[2]=b.x+b.w; break; } } }
  for(const t of targetsY){ for(let i=0;i<3;i++){ if(Math.abs(ey[i]-t)<SNAP){ b.y += t-ey[i]; drawGuide("h",t); ey[0]=b.y;ey[1]=b.y+b.h/2;ey[2]=b.y+b.h; break; } } }
}

// ── 포인터: 이동/리사이즈/마키 ──
let drag=null;
canvas.addEventListener("pointerdown",(e)=>{
  if(editingId) return;
  const handle = e.target.closest(".h");
  const blkEl = e.target.closest(".blk");
  if(handle && blkEl){
    e.preventDefault(); canvas.setPointerCapture(e.pointerId);
    const b=byId(blkEl.dataset.id);
    drag={mode:"resize",dir:handle.dataset.dir,id:b.id,sx:e.clientX,sy:e.clientY,b:{...b}};
    return;
  }
  if(blkEl){
    const id=blkEl.dataset.id;
    if(e.shiftKey){ state.sel = state.sel.includes(id)?state.sel.filter(x=>x!==id):[...state.sel,id]; render(); return; }
    if(!state.sel.includes(id)) state.sel=[id];
    canvas.setPointerCapture(e.pointerId);
    const moving = state.sel.map(byId).map(b=>({id:b.id, b:{...b}}));
    drag={mode:"move",sx:e.clientX,sy:e.clientY,moving};
    render();
    return;
  }
  // 빈 캔버스 → 마키
  canvas.setPointerCapture(e.pointerId);
  const r=cRect();
  drag={mode:"marquee",sx:e.clientX,sy:e.clientY,ox:(e.clientX-r.left)/r.width*100,oy:(e.clientY-r.top)/r.height*100};
  state.sel=[]; render();
});
canvas.addEventListener("pointermove",(e)=>{
  if(!drag) return;
  const d=pxToPct(e.clientX-drag.sx, e.clientY-drag.sy);
  if(drag.mode==="move"){
    const others = blocks().filter(b=>!state.sel.includes(b.id));
    drag.moving.forEach(m=>{ const b=byId(m.id); b.x=clamp(m.b.x+d.x,0,100-m.b.w); b.y=clamp(m.b.y+d.y,0,100-m.b.h); });
    if(state.sel.length===1) snapMove(byId(state.sel[0]), others); else clearGuides();
    paintPositions();
  } else if(drag.mode==="resize"){
    const b=byId(drag.id), o=drag.b, dir=drag.dir;
    let x=o.x,y=o.y,w=o.w,h=o.h;
    if(dir.includes("e")) w=o.w+d.x; if(dir.includes("s")) h=o.h+d.y;
    if(dir.includes("w")){ x=o.x+d.x; w=o.w-d.x; } if(dir.includes("n")){ y=o.y+d.y; h=o.h-d.y; }
    b.x=x;b.y=y;b.w=Math.max(4,w);b.h=Math.max(3,h);
    paintPositions(); positionHandlesLive(b);
  } else if(drag.mode==="marquee"){
    const r=cRect(); const cx=(e.clientX-r.left)/r.width*100, cy=(e.clientY-r.top)/r.height*100;
    const x=Math.min(drag.ox,cx),y=Math.min(drag.oy,cy),w=Math.abs(cx-drag.ox),h=Math.abs(cy-drag.oy);
    let m=canvas.querySelector(".marquee"); if(!m){m=document.createElement("div");m.className="marquee";canvas.appendChild(m);}
    m.style.cssText=`left:${x}%;top:${y}%;width:${w}%;height:${h}%;`;
    drag.rect={x,y,w,h};
  }
});
canvas.addEventListener("pointerup",(e)=>{
  if(!drag) return;
  if(drag.mode==="marquee"){
    canvas.querySelector(".marquee")?.remove();
    const r=drag.rect;
    if(r && (r.w>1||r.h>1)){
      state.sel = blocks().filter(b=>!(b.x+b.w<r.x||r.x+r.w<b.x||b.y+b.h<r.y||r.y+r.h<b.y)).map(b=>b.id);
    }
    drag=null; render(); return;
  }
  clearGuides();
  drag=null; commit(); render();
});
// 드래그 중 DOM 직접 갱신(재렌더 없이)
function paintPositions(){
  blocks().forEach(b=>{ const el=canvas.querySelector('.blk[data-id="'+b.id+'"]'); if(el){ el.style.left=b.x+"%";el.style.top=b.y+"%";el.style.width=b.w+"%";el.style.height=b.h+"%"; } });
  if(state.sel.length>1){ const gb=groupBox(state.sel),box=canvas.querySelector(".gbbox"); if(box) box.style.cssText=`left:${gb.x}%;top:${gb.y}%;width:${gb.w}%;height:${gb.h}%;`; }
}
function positionHandlesLive(){ /* 핸들은 블록 자식이라 자동 따라감 */ }

// 더블클릭 → 텍스트 인라인 편집
canvas.addEventListener("dblclick",(e)=>{
  const el=e.target.closest(".blk"); if(!el) return; const b=byId(el.dataset.id); if(!b||b.type!=="text") return;
  state.sel=[b.id]; editingId=b.id; render();
  const live=canvas.querySelector('.blk[data-id="'+b.id+'"]'); live.focus();
});
canvas.addEventListener("blur",(e)=>{
  const el=e.target.closest(".blk"); if(el && editingId===el.dataset.id){ const b=byId(editingId); if(b){b.text=el.innerHTML;} editingId=null; commit(); render(); }
},true);

// ── 인스펙터/레이어/툴바 클릭 ──
inspector.addEventListener("click",(e)=>{
  const t=e.target.closest("button, .layer"); if(!t) return;
  const b=state.sel.length===1?byId(state.sel[0]):null;
  if(t.dataset.layer){ state.sel=[t.dataset.layer]; render(); return; }
  if(t.dataset.act){ doAct(t.dataset.act); return; }
  if(t.dataset.al1 && b){ alignTo([b.id],t.dataset.al1,{x:0,y:0,w:100,h:100}); commit(); render(); return; }
  if(t.dataset.al){ alignTo(state.sel,t.dataset.al,groupBox(state.sel)); commit(); render(); return; }
  if(t.dataset.dist){ distribute(state.sel,t.dataset.dist); commit(); render(); return; }
  if(t.dataset.color && b){ b.color=t.dataset.color; commit(); render(); return; }
  if(t.dataset.fill && b){ b.fill=t.dataset.fill; commit(); render(); return; }
  if(t.dataset.align && b){ b.align=t.dataset.align; commit(); render(); return; }
  if(t.dataset.p2 && b){ b[t.dataset.p2]= t.dataset.p2==="weight"?Number(t.dataset.v):Number(t.dataset.v); commit(); render(); return; }
});
inspector.addEventListener("change",(e)=>{
  const inp=e.target.closest("input[data-p]"); if(!inp) return; const b=byId(state.sel[0]); if(!b) return;
  b[inp.dataset.p]=Number(inp.value); commit(); render();
});
function doAct(act){
  if(act==="del"){ blocks().splice(0,blocks().length,...blocks().filter(b=>!state.sel.includes(b.id))); state.sel=[]; commit(); render(); }
  else if(act==="dup"){ duplicateSel(); }
  else if(act==="front"){ state.sel.forEach(id=>{ const b=byId(id); blocks().splice(blocks().indexOf(b),1); blocks().push(b); }); commit(); render(); }
  else if(act==="back"){ state.sel.slice().reverse().forEach(id=>{ const b=byId(id); blocks().splice(blocks().indexOf(b),1); blocks().unshift(b); }); commit(); render(); }
  else if(act==="group"){ const g="g"+uid(); state.sel.forEach(id=>byId(id).groupId=g); commit(); render(); hint("그룹으로 묶임 (groupId 평면 태그)"); }
}
function duplicateSel(){
  const copies = state.sel.map(byId).map(b=>({...JSON.parse(JSON.stringify(b)),id:uid(),x:clamp(b.x+3,0,97),y:clamp(b.y+3,0,97)}));
  blocks().push(...copies); state.sel=copies.map(c=>c.id); commit(); render(); hint("복제됨 (⌘D)");
}

// ── 좌측 도구 ──
document.getElementById("rail").addEventListener("click",(e)=>{
  const btn=e.target.closest("button"); if(!btn) return;
  const tool=btn.dataset.tool;
  document.querySelectorAll(".rail button").forEach(b=>b.classList.toggle("on",b===btn));
  if(tool==="text"){ addBlock("text"); setSelectTool(); }
  else if(tool==="image"){ addBlock("image"); setSelectTool(); }
  else if(tool==="shape"){ openShapePop(btn); }
});
function setSelectTool(){ document.querySelectorAll(".rail button").forEach(b=>b.classList.toggle("on",b.dataset.tool==="select")); }
function openShapePop(anchor){
  closePops();
  const p=document.createElement("div"); p.className="pop"; p.id="shapepop";
  p.innerHTML=`<div class="ttl">도형</div><div class="shapegrid">
    <button data-shape="rect"><div class="pv" style="width:24px;height:18px;background:#1f6f72;border-radius:3px"></div></button>
    <button data-shape="ellipse"><div class="pv" style="width:22px;height:22px;background:#1f6f72;border-radius:50%"></div></button>
    <button data-shape="line"><div class="pv" style="width:24px;height:2px;background:#1c1b1b"></div></button>
  </div>`;
  document.body.appendChild(p);
  const r=anchor.getBoundingClientRect(); p.style.left=(r.right+8)+"px"; p.style.top=r.top+"px";
  p.addEventListener("click",(e)=>{ const b=e.target.closest("button[data-shape]"); if(b){ addBlock("shape",b.dataset.shape); closePops(); setSelectTool(); } });
}
function closePops(){ document.querySelectorAll(".pop,.ctx").forEach(e=>e.remove()); }
document.addEventListener("pointerdown",(e)=>{ if(!e.target.closest(".pop,.ctx,.rail")) closePops(); },true);

// ── 페이지 ──
pagesEl.addEventListener("click",(e)=>{
  const more=e.target.closest("[data-pmore]"); if(more){ e.stopPropagation(); pageMenu(Number(more.dataset.pmore), more); return; }
  const th=e.target.closest("[data-page]"); if(th){ state.cur=Number(th.dataset.page); state.sel=[]; editingId=null; render(); return; }
  if(e.target.closest("#addpage")){ insertPage(state.cur+1, blankBlocks("content")); }
});
function insertPage(idx, blks){ state.pages.splice(idx,0,{id:uid(),blocks:blks}); state.cur=idx; state.sel=[]; commit(); render(); hint("새 페이지를 현재 다음("+(idx+1)+")에 추가"); }
function pageMenu(i, anchor){
  closePops();
  const m=document.createElement("div"); m.className="ctx";
  m.innerHTML=`<div data-pm="dupBlank">빈 페이지 (현재 다음)</div><div data-pm="dup">현재 페이지 복제</div><div class="sep"></div><div data-pm="up">위로 이동</div><div data-pm="down">아래로 이동</div><div class="sep"></div><div class="danger" data-pm="del">삭제 <span class="kbd">⌫</span></div>`;
  document.body.appendChild(m);
  const r=anchor.getBoundingClientRect(); m.style.left=Math.min(r.left,window.innerWidth-190)+"px"; m.style.top=(r.top-150)+"px";
  m.addEventListener("click",(e)=>{ const d=e.target.closest("[data-pm]"); if(!d) return; const a=d.dataset.pm;
    if(a==="dupBlank") insertPage(i+1, blankBlocks("content"));
    else if(a==="dup") insertPage(i+1, JSON.parse(JSON.stringify(state.pages[i].blocks)).map(b=>({...b,id:uid()})));
    else if(a==="del" && state.pages.length>1){ state.pages.splice(i,1); state.cur=Math.max(0,Math.min(state.cur,state.pages.length-1)); commit(); render(); }
    else if(a==="up" && i>0){ [state.pages[i-1],state.pages[i]]=[state.pages[i],state.pages[i-1]]; state.cur=i-1; commit(); render(); }
    else if(a==="down" && i<state.pages.length-1){ [state.pages[i+1],state.pages[i]]=[state.pages[i],state.pages[i+1]]; state.cur=i+1; commit(); render(); }
    closePops();
  });
}

// ── 플로팅 툴바 클릭 ──
wrap.addEventListener("click",(e)=>{
  const fb=e.target.closest("[data-fb]"); const fc=e.target.closest("[data-fbc]");
  const b = state.sel.length===1?byId(state.sel[0]):null; if(!b||b.type!=="text") return;
  if(fc){ b.color=fc.dataset.fbc; commit(); render(); }
  else if(fb){ const k=fb.dataset.fb; if(k==="weight"){b.weight=b.weight===900?400:900;} else if(k==="italic"){b.italic=!b.italic;} else if(k==="edit"){ editingId=b.id; render(); canvas.querySelector('.blk[data-id="'+b.id+'"]').focus(); return; } commit(); render(); }
});

// ── 줌 ──
function setZoom(z){ state.zoom=clamp(z,0.25,5); applyZoom(); renderFloating(); }
document.getElementById("zin").onclick=()=>setZoom(state.zoom+0.1);
document.getElementById("zout").onclick=()=>setZoom(state.zoom-0.1);
document.getElementById("zfit").onclick=()=>setZoom(1);
stage.addEventListener("wheel",(e)=>{ if(e.metaKey||e.ctrlKey){ e.preventDefault(); setZoom(state.zoom+(e.deltaY<0?0.1:-0.1)); } },{passive:false});
document.getElementById("undo").onclick=undo;
document.getElementById("redo").onclick=redo;

// ── 우클릭 메뉴(캔버스 블록) ──
canvas.addEventListener("contextmenu",(e)=>{
  const el=e.target.closest(".blk"); if(!el) return; e.preventDefault();
  if(!state.sel.includes(el.dataset.id)) state.sel=[el.dataset.id]; render();
  closePops();
  const m=document.createElement("div"); m.className="ctx";
  m.innerHTML=`<div data-act="dup">복제 <span class="kbd">⌘D</span></div><div data-act="front">맨 앞으로</div><div data-act="back">맨 뒤로</div>${state.sel.length>1?'<div data-act="group">그룹</div>':''}<div class="sep"></div><div class="danger" data-act="del">삭제 <span class="kbd">Del</span></div>`;
  document.body.appendChild(m); m.style.left=Math.min(e.clientX,window.innerWidth-190)+"px"; m.style.top=e.clientY+"px";
  m.addEventListener("click",(ev)=>{ const d=ev.target.closest("[data-act]"); if(d){ doAct(d.dataset.act); closePops(); } });
});

// ── 키보드 단축키 ──
window.addEventListener("keydown",(e)=>{
  const tag=(e.target.tagName||""); if(editingId||/INPUT|TEXTAREA|SELECT/.test(tag)||e.target.isContentEditable) return;
  const meta=e.metaKey||e.ctrlKey;
  if(meta && e.key.toLowerCase()==="z"){ e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if(meta && e.key.toLowerCase()==="y"){ e.preventDefault(); redo(); return; }
  if(meta && e.key.toLowerCase()==="d"){ e.preventDefault(); if(state.sel.length) duplicateSel(); return; }
  if(meta && e.key.toLowerCase()==="c"){ if(state.sel.length){ state.clip=state.sel.map(byId).map(b=>JSON.parse(JSON.stringify(b))); hint("복사됨 ("+state.clip.length+") — 다른 페이지로 이동해 ⌘V"); } return; }
  if(meta && e.key.toLowerCase()==="v"){ if(state.clip){ const copies=state.clip.map(b=>({...JSON.parse(JSON.stringify(b)),id:uid(),x:clamp(b.x+3,0,97),y:clamp(b.y+3,0,97)})); blocks().push(...copies); state.sel=copies.map(c=>c.id); commit(); render(); hint("붙여넣기 ("+copies.length+") — 페이지 간 복붙"); } return; }
  if(meta && e.key.toLowerCase()==="a"){ e.preventDefault(); state.sel=blocks().map(b=>b.id); render(); return; }
  if(e.key==="Delete"||e.key==="Backspace"){ if(state.sel.length){ e.preventDefault(); doAct("del"); } return; }
  if(e.key==="Escape"){ state.sel=[]; render(); return; }
  // 방향키 nudge
  const step = e.shiftKey?2.27:0.23; // 10px / 1px (440 기준 환산 데모)
  if(e.key.startsWith("Arrow") && state.sel.length){ e.preventDefault();
    state.sel.map(byId).forEach(b=>{ if(e.key==="ArrowLeft")b.x=clamp(b.x-step,0,100-b.w); if(e.key==="ArrowRight")b.x=clamp(b.x+step,0,100-b.w); if(e.key==="ArrowUp")b.y=clamp(b.y-step,0,100-b.h); if(e.key==="ArrowDown")b.y=clamp(b.y+step,0,100-b.h); });
    paintPositions(); clearTimeout(window._nudgeT); window._nudgeT=setTimeout(()=>{commit();render();},250);
  }
});

render();
</script>
</body>
</html>
