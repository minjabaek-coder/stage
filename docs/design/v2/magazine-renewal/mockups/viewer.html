<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>매거진 뷰어 목업 — STAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;900&family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#faf7f4; --ink:#1c1b1b; --ink-muted:#444748; --taupe:#7a7060;
  --gold:#c4a35a; --gold-deep:#6f5c24; --line:rgba(28,27,27,.12);
  --serif:'Noto Serif KR',serif; --sans:'Noto Sans KR',sans-serif; --mono:'DM Mono',monospace;
  --reader-bg:#0e0d0b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:#e9e4de;color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── 목업 툴바(제품 아님) ── */
.mock-bar{position:sticky;top:0;z-index:50;background:#1c1b1b;color:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:10px 18px;font-size:12px}
.mock-bar b{font-family:var(--serif);font-weight:900;letter-spacing:-.02em;font-size:14px}
.mock-bar .seg{display:inline-flex;border:1px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden}
.mock-bar .seg button{background:transparent;color:rgba(255,255,255,.6);border:0;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans)}
.mock-bar .seg button.on{background:var(--gold);color:#1c1b1b;font-weight:700}
.mock-bar .note{margin-left:auto;color:rgba(255,255,255,.4);font-family:var(--mono);font-size:10px}
.mock-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe)}

.stage{padding:26px;display:flex;justify-content:center}
.hidden{display:none!important}

/* ════════════ 데스크톱 뷰어 셸 ════════════ */
.dv{width:100%;max-width:1180px;background:var(--reader-bg);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);display:flex;flex-direction:column;height:780px}
.dv-head{height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.08);color:#fff}
.dv-head .left{display:flex;align-items:center;gap:14px}
.dv-logo{font-family:var(--serif);font-weight:900;font-size:18px;letter-spacing:-.03em}
.dv-issue{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.dv-title{font-family:var(--serif);font-size:14px;color:rgba(255,255,255,.85)}
.dv-x{color:rgba(255,255,255,.5);font-size:18px;cursor:pointer}
.dv-body{flex:1;position:relative;display:flex;overflow:hidden}
.dv-main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:24px}

/* 이미지형 페이지 */
.spread{display:flex;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative}
.pg{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pg.spreadsize{width:236px;height:354px}
.pg.singlesize{width:330px;height:495px}
.pg .cap{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.5);letter-spacing:1px}
.pg.l{border-radius:3px 0 0 3px;background:linear-gradient(135deg,#2a2320,#171210)}
.pg.r{border-radius:0 3px 3px 0;background:linear-gradient(135deg,#1d2733,#0e161f)}
.pg.solo{border-radius:3px;background:linear-gradient(135deg,#2a2320,#171210)}
.pg .ph-title{font-family:var(--serif);color:#fff;font-size:22px;font-weight:900;text-align:center;padding:0 20px;opacity:.92}
.pg .ph-sub{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-top:8px;text-align:center}
.spread .gutter{position:absolute;left:50%;top:0;bottom:0;width:18px;transform:translateX(-50%);background:linear-gradient(90deg,transparent,rgba(0,0,0,.45),transparent);pointer-events:none}
.flip-hint{position:absolute;right:-1px;bottom:-1px;width:34px;height:34px;background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,.18) 50%);border-radius:0 0 3px 0}

/* 구성형 캔버스 */
.composed{background:#fbf8f3;border-radius:3px;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;overflow:hidden;flex-shrink:0}
.composed.spreadsize{width:236px;height:354px}
.composed.singlesize{width:300px;height:450px}
.cmp-spread{display:flex;gap:2px;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative}
.cmp-spread .composed{box-shadow:none}
.cmp-spread .gutter{position:absolute;left:50%;top:0;bottom:0;width:16px;transform:translateX(-50%);background:linear-gradient(90deg,transparent,rgba(0,0,0,.18),transparent);pointer-events:none}
.cb{position:absolute}
.cb-img{background:linear-gradient(135deg,#3a4a5a,#1d2733);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-family:var(--mono);font-size:8px;text-align:center;padding:6px}
.cb-kicker{font-family:var(--mono);font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep)}
.cb-h{font-family:var(--serif);font-weight:900;color:var(--ink);line-height:1.25}
.cb-p{font-family:var(--serif);color:var(--ink-muted);line-height:1.7}

/* 데스크톱 컨트롤바 */
.dv-foot{height:64px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:14px;padding:0 18px;color:#fff}
.ctl{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;background:transparent;border:0;font-family:var(--sans);white-space:nowrap}
.ctl:hover{color:#fff}
.ctl .ico{width:26px;height:26px;border:1px solid rgba(255,255,255,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.viewseg{display:inline-flex;border:1px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden}
.viewseg button{background:transparent;color:rgba(255,255,255,.55);border:0;padding:6px 10px;font-size:11px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:5px}
.viewseg button.on{background:rgba(196,163,90,.18);color:#fff}
.viewseg button .gl{font-size:13px}
.pagenav{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.8)}
.pagenav .arw{width:30px;height:30px;border:1px solid rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.zoom{display:flex;align-items:center;gap:8px;margin-left:auto}
.zoom input{width:80px;accent-color:var(--gold)}
.zoom .lbl{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.5)}
.flipnote{font-family:var(--mono);font-size:9px;color:rgba(196,163,90,.7);border:1px solid rgba(196,163,90,.3);border-radius:5px;padding:3px 7px}
.progress{position:absolute;left:0;right:0;top:-1px;height:2px;background:rgba(255,255,255,.1)}
.progress i{display:block;height:100%;background:var(--gold)}

/* ── 통일 목차(이미지형·구성형 공통 리스트) ── */
.toc-side{width:300px;flex-shrink:0;background:#15130f;border-left:1px solid rgba(255,255,255,.08);padding:16px;overflow:auto}
.toc-side h4{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;justify-content:space-between}
.toc-list{display:flex;flex-direction:column;gap:3px}
.toc-row{display:flex;align-items:center;gap:11px;padding:8px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.78)}
.toc-row:hover{background:rgba(255,255,255,.05)}
.toc-row.on{background:rgba(196,163,90,.15);color:#fff}
.toc-row .thumb{width:34px;height:48px;border-radius:3px;flex-shrink:0;background:linear-gradient(135deg,#2a2320,#141014)}
.toc-row.on .thumb{outline:2px solid var(--gold)}
.toc-row .meta{flex:1;min-width:0}
.toc-row .ttl{font-size:12.5px;font-family:var(--serif);line-height:1.35}
.toc-row .pg{font-family:var(--mono);font-size:10px;color:var(--gold);margin-top:2px}

/* 구성형 리더설정 팝오버 */
.settings-pop{position:absolute;right:18px;bottom:72px;width:230px;background:#1e1b16;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px;color:#fff;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:10}
.settings-pop h5{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;font-size:12px;color:rgba(255,255,255,.8)}
.srow .stepper{display:flex;gap:4px}
.srow .stepper b{width:24px;height:24px;border:1px solid rgba(255,255,255,.2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:400}
.themes{display:flex;gap:6px}
.themes i{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.themes i.t1{background:#fbf8f3} .themes i.t2{background:#f3e9d6} .themes i.t3{background:#2a2724}
.themes i.on{border-color:var(--gold)}

/* ════════════ 모바일 뷰어 ════════════ */
.phone{width:330px;height:710px;background:#000;border-radius:38px;padding:11px;box-shadow:0 30px 80px rgba(0,0,0,.4);position:relative}
.screen{width:100%;height:100%;background:var(--reader-bg);border-radius:28px;overflow:hidden;position:relative}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:30}
.m-overlay{position:absolute;inset:0;z-index:20;pointer-events:none}
.m-top{position:absolute;top:0;left:0;right:0;padding:34px 16px 12px;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);display:flex;align-items:center;justify-content:space-between;color:#fff}
.m-top .t{font-family:var(--serif);font-size:13px}
.m-bot{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 22px;background:linear-gradient(0deg,rgba(0,0,0,.6),transparent);color:#fff}
.m-ctls{display:flex;align-items:center;justify-content:space-around;margin-bottom:10px}
.m-ctls .c{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:rgba(255,255,255,.7);cursor:pointer}
.m-ctls .c .ico{font-size:17px}
.m-prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}.m-prog i{display:block;height:100%;background:var(--gold);border-radius:2px}
.m-hint{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);display:flex;justify-content:space-between;padding:0 8px;color:rgba(255,255,255,.25);font-size:30px;z-index:5;pointer-events:none}
.gesture-tip{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:rgba(255,255,255,.85);font-size:10px;padding:6px 12px;border-radius:20px;z-index:25;white-space:nowrap}
.m-page{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1d2733,#0e161f)}
.m-page .ph-title{font-family:var(--serif);color:#fff;font-size:26px;font-weight:900;text-align:center;padding:0 28px}
.m-page .ph-sub{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:3px;margin-top:10px;text-transform:uppercase;text-align:center}
/* 모바일 구성형: 고정 디자인 캔버스를 폭맞춤 scale(reflow 없음, 이미지형과 동일) */
.m-fixed{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--reader-bg)}
.m-canvas{width:100%;aspect-ratio:2/3;background:#fbf8f3;position:relative;overflow:hidden}
.m-flow{position:absolute;inset:0;overflow:auto;background:#fbf8f3;padding:46px 20px 90px}
.m-flow .k{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-deep)}
.m-flow h2{font-family:var(--serif);font-weight:900;font-size:24px;line-height:1.3;margin:8px 0 14px}
.m-flow .fimg{width:100%;height:180px;border-radius:6px;background:linear-gradient(135deg,#3a4a5a,#1d2733);margin:14px 0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-family:var(--mono);font-size:9px}
.m-flow p{font-family:var(--serif);color:var(--ink-muted);font-size:15px;line-height:1.95;margin-bottom:14px}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:40;background:#1e1b16;border-radius:18px 18px 0 0;padding:16px 18px 24px;color:#fff;box-shadow:0 -10px 40px rgba(0,0,0,.5);max-height:62%;overflow:auto}
.sheet .grip{width:38px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin:0 auto 14px}
.sheet h5{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}

.caption{max-width:1180px;margin:14px auto 0;font-size:12px;color:var(--taupe);font-family:var(--mono)}
.caption b{color:var(--ink-muted)}
</style>
</head>
<body>

<div class="mock-bar">
  <b>STAGE</b> <span class="mock-label">매거진 뷰어 목업 · Stage 3 (rev.3)</span>
  <span class="seg" id="segDevice">
    <button data-d="desktop" class="on">데스크톱</button>
    <button data-d="mobile">모바일</button>
  </span>
  <span class="seg" id="segKind">
    <button data-k="image" class="on">이미지형 (1~38호)</button>
    <button data-k="composed">구성형 (39호+)</button>
  </span>
  <span class="note">데스크톱: 한/두 페이지 토글·목차 클릭 · 모바일: 화면 탭=오버레이 · 두 종류 동일 뷰어</span>
</div>

<div class="stage" id="stage"></div>
<div class="caption" id="caption"></div>

<script>
const state={device:'desktop',kind:'image',spread:true,toc:false,settings:false,overlay:true};

/* ── 페이지 렌더 헬퍼 ── */
function imgPage(side,title,sub,cap,sz){
  const cls=side==='solo'?'solo '+sz:side+' '+sz;
  return `<div class="pg ${cls}"><div>${title}${sub?`<div class="ph-sub">${sub}</div>`:''}</div><div class="cap">${cap}</div></div>`;
}
function composedCanvas(variant,sz){
  if(variant==='cover'){return `<div class="composed ${sz}">
    <div class="cb cb-img" style="left:0;top:0;width:100%;height:46%">이미지 (focus crop)</div>
    <div class="cb" style="left:8%;top:52%;width:84%"><div class="cb-kicker">Cover Story</div></div>
    <div class="cb" style="left:8%;top:57%;width:84%"><div class="cb-h" style="font-size:${sz==='singlesize'?23:18}px">무대와<br>AI의 만남</div></div>
    <div class="cb" style="left:8%;top:${sz==='singlesize'?78:74}%;width:84%"><div class="cb-p" style="font-size:${sz==='singlesize'?10:8}px">STAGE가 인공지능과 만났습니다. 리뉴얼을 지휘한 박경준 대표를 만나 탄생 배경과 앞으로의 무대를 물었습니다.</div></div>
  </div>`;}
  return `<div class="composed ${sz}">
    <div class="cb" style="left:9%;top:8%;width:82%"><div class="cb-kicker">Interview</div></div>
    <div class="cb" style="left:9%;top:13%;width:82%"><div class="cb-h" style="font-size:${sz==='singlesize'?15:12}px">"관객의 호기심을<br>기술로 확장한다"</div></div>
    <div class="cb cb-img" style="left:9%;top:30%;width:82%;height:26%">이미지 블록</div>
    <div class="cb" style="left:9%;top:60%;width:82%"><div class="cb-p" style="font-size:${sz==='singlesize'?9.5:7.5}px">예술, 특히 오페라는 본래 관객에게 깊은 질문을 던지는 장르입니다. 한 편의 오페라를 보고 나면 무수한 궁금증이 생겨나죠. STAGE의 AI 도슨트는 바로 이 지점에서 출발했습니다.</div></div>
  </div>`;
}

/* ── 데스크톱 ── */
function deskImage(){
  const sz=state.spread?'spreadsize':'singlesize';
  const body=state.spread
    ? `<div class="spread">${imgPage('l',`<div class="ph-title">건반 위의<br>사색</div>`,'STAGE Vol.38','12쪽',sz)}${imgPage('r',`<div class="ph-title" style="font-size:15px;font-weight:600;line-height:1.7">"무대 위에서 나는<br>늘 질문을 던진다"</div>`,'','13쪽',sz)}<div class="gutter"></div><div class="flip-hint"></div></div>`
    : `<div style="position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5)">${imgPage('solo',`<div class="ph-title">건반 위의<br>사색</div>`,'STAGE Vol.38','13쪽',sz)}<div class="flip-hint"></div></div>`;
  return shell('Issue 38','건반 위의 사색 — 피아니스트 특집','46%',body,state.spread?'12–13 / 64':'13 / 64',false);
}
function deskComposed(){
  const sz=state.spread?'spreadsize':'singlesize';
  const body=state.spread
    ? `<div class="cmp-spread">${composedCanvas('content',sz)}${composedCanvas('cover',sz)}<div class="gutter"></div></div>`
    : composedCanvas('cover',sz);
  return shell('Issue 39','박경준, 스테이지와 AI','30%',body,state.spread?'2–3 / 24':'3 / 24',true);
}
function shell(issue,title,prog,body,pageLabel,isComposed){
  return `<div class="dv">
  <div class="dv-head"><div class="left"><span class="dv-logo">STAGE</span><span class="dv-issue">${issue}</span><span class="dv-title">${title}</span></div><span class="dv-x">✕</span></div>
  <div class="dv-body">
    <div class="dv-main"><div class="progress"><i style="width:${prog}"></i></div>${body}</div>
    ${state.toc?tocSide():''}
  </div>
  <div class="dv-foot">
    <button class="ctl" onclick="toggleToc()"><span class="ico">☰</span>목차</button>
    <span class="viewseg"><button class="${!state.spread?'on':''}" onclick="setSpread(false)"><span class="gl">▯</span>한 페이지</button><button class="${state.spread?'on':''}" onclick="setSpread(true)"><span class="gl">▭▭</span>두 페이지</button></span>
    <div class="pagenav"><span class="arw">‹</span><span>${pageLabel}</span><span class="arw">›</span></div>
    <div class="zoom"><span class="flipnote">📖 넘김 효과</span><span class="lbl">100%</span><input type="range" min="100" max="${isComposed?300:500}" value="100"><button class="ctl"><span class="ico">⛶</span></button><button class="ctl"><span class="ico">◐</span></button></div>
  </div>
</div>`;
}

/* ── 통일 목차(두 종류 동일 리스트 + 썸네일) ── */
const TOC={
  image:[['건반 위의 사색 — 여는 글','9쪽'],['피아니스트 인터뷰','13쪽'],['리뷰 — 베토벤 소나타 전곡','24쪽'],['포토 에세이','38쪽'],['에디터의 편지','61쪽']],
  composed:[['커버스토리 — 무대와 AI','01'],['인터뷰 — 박경준 대표','03'],['Opera Inside — 토스카','08'],['Lied & Song','14'],['People — 임청화 40주년','19']]
};
function tocSide(){
  const rows=TOC[state.kind],onIdx=state.kind==='image'?1:1;
  return `<div class="toc-side"><h4><span>목차</span><span style="color:rgba(255,255,255,.3)">${state.kind==='image'?'이미지형':'구성형'}</span></h4><div class="toc-list">
  ${rows.map((r,i)=>`<div class="toc-row ${i==onIdx?'on':''}"><div class="thumb"></div><div class="meta"><div class="ttl">${r[0]}</div><div class="pg">${r[1]}</div></div></div>`).join('')}
  </div></div>`;
}
function settingsPop(){return `<div class="settings-pop"><h5>읽기 설정 (구성형)</h5>
<div class="srow">글자 크기<span class="stepper"><b>−</b><b>+</b></span></div>
<div class="srow">줄 간격<span class="stepper"><b>−</b><b>+</b></span></div>
<div class="srow">여백<span class="stepper"><b>−</b><b>+</b></span></div>
<div class="srow">테마<span class="themes"><i class="t1 on"></i><i class="t2"></i><i class="t3"></i></span></div></div>`;}

/* ── 모바일(항상 단면/flow) ── */
function mobImage(){return `
<div class="phone"><div class="screen">
  <div class="notch"></div>
  <div class="m-page"><div><div class="ph-title">건반 위의<br>사색</div><div class="ph-sub">STAGE Vol.38 · 13쪽</div></div></div>
  <div class="m-hint"><span>‹</span><span>›</span></div>
  <div class="gesture-tip">한 장씩 좌우 스와이프 · 두 손가락 핀치=확대</div>
  ${state.overlay?`<div class="m-overlay">
    <div class="m-top" style="pointer-events:auto"><span>‹ 닫기</span><span class="t">건반 위의 사색</span><span>⛶</span></div>
    <div class="m-bot" style="pointer-events:auto">
      <div class="m-ctls">
        <div class="c" onclick="event.stopPropagation();toggleToc()"><span class="ico">☰</span>목차</div>
        <div class="c"><span class="ico">⊕</span>확대</div>
        <div class="c"><span class="ico">◐</span>다크</div>
        <div class="c"><span class="ico">⛶</span>전체</div>
      </div>
      <div class="m-prog"><i style="width:42%"></i></div>
      <div style="text-align:center;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6);margin-top:6px">13 / 64</div>
    </div></div>`:`<div class="gesture-tip" style="bottom:auto;top:60px">화면 탭 → 컨트롤 표시</div>`}
  ${state.toc?mobSheetToc():''}
</div></div>`;}

function mobComposed(){return `
<div class="phone"><div class="screen">
  <div class="notch"></div>
  <div class="m-fixed">
    <div class="m-canvas">
      <div class="cb cb-img" style="left:0;top:0;width:100%;height:46%">이미지 (focus crop)</div>
      <div class="cb" style="left:8%;top:52%;width:84%"><div class="cb-kicker">Cover Story</div></div>
      <div class="cb" style="left:8%;top:56%;width:84%"><div class="cb-h" style="font-size:30px">무대와<br>AI의 만남</div></div>
      <div class="cb" style="left:8%;top:80%;width:84%"><div class="cb-p" style="font-size:13px">STAGE가 인공지능과 만났습니다. 리뉴얼을 지휘한 박경준 대표를 만나 탄생 배경과 앞으로의 무대를 물었습니다.</div></div>
    </div>
  </div>
  <div class="m-hint"><span>‹</span><span>›</span></div>
  <div class="gesture-tip">한 장씩 좌우 스와이프 · 핀치=확대 (이미지형과 동일)</div>
  ${state.overlay?`<div class="m-overlay">
    <div class="m-top" style="pointer-events:auto"><span>‹ 닫기</span><span class="t">박경준, 스테이지와 AI</span><span>⛶</span></div>
    <div class="m-bot" style="pointer-events:auto">
      <div class="m-ctls">
        <div class="c" onclick="event.stopPropagation();toggleToc()"><span class="ico">☰</span>목차</div>
        <div class="c"><span class="ico">⊕</span>확대</div>
        <div class="c"><span class="ico">◐</span>다크</div>
        <div class="c"><span class="ico">⛶</span>전체</div>
      </div>
      <div class="m-prog"><i style="width:30%"></i></div>
      <div style="text-align:center;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6);margin-top:6px">3 / 24 · 실제 텍스트(선택·복사·RAG)</div>
    </div></div>`:`<div class="gesture-tip" style="bottom:auto;top:60px">화면 탭 → 컨트롤 표시</div>`}
  ${state.toc?mobSheetToc():''}
</div></div>`;}

function mobSheetToc(){const rows=TOC[state.kind];return `<div class="sheet"><div class="grip"></div><h5>목차</h5><div class="toc-list">${rows.map((r,i)=>`<div class="toc-row ${i==1?'on':''}"><div class="thumb"></div><div class="meta"><div class="ttl">${r[0]}</div><div class="pg">${r[1]}</div></div></div>`).join('')}</div></div>`;}

const captions={
  'desktop-image':'<b>데스크톱 · 이미지형</b> — 한/두 페이지 토글. 두 페이지=양면 스프레드. 실물 잡지 <b>넘김 효과</b>. 하단: 목차·페이지이동·줌·다크.',
  'desktop-composed':'<b>데스크톱 · 구성형</b> — 이미지형과 <b>동일한 뷰어</b>(한/두 페이지·양면·넘김 효과). 차이는 비트맵 대신 <b>실제 텍스트를 얹은 고정 디자인 페이지</b>(선택·복사·RAG). 독자 글자/테마 설정 없음(편집 의도 보존).',
  'mobile-image':'<b>모바일 · 이미지형</b> — 단면 페이지 스와이프. 탭=오버레이 토글, 핀치/더블탭=확대. 목차=하단 시트(통일 리스트).',
  'mobile-composed':'<b>모바일 · 구성형</b> — 이미지형과 <b>동일</b>: 고정 디자인 페이지를 폭맞춤 단면 스와이프 + 핀치줌(reflow 없음). 밑에 실제 텍스트 = 검색·복사·RAG. 독자 설정 없음.'
};

function render(){
  const s=document.getElementById('stage');
  if(state.device==='desktop') s.innerHTML=state.kind==='image'?deskImage():deskComposed();
  else s.innerHTML=state.kind==='image'?mobImage():mobComposed();
  document.getElementById('caption').innerHTML=captions[state.device+'-'+state.kind];
}
function toggleToc(){state.toc=!state.toc;state.settings=false;render();}
function toggleSettings(){state.settings=!state.settings;state.toc=false;render();}
function setSpread(v){state.spread=v;render();}

document.getElementById('segDevice').onclick=e=>{if(e.target.dataset.d){[...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));state.device=e.target.dataset.d;state.toc=state.settings=false;state.overlay=true;render();}};
document.getElementById('segKind').onclick=e=>{if(e.target.dataset.k){[...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));state.kind=e.target.dataset.k;state.toc=state.settings=false;render();}};
document.getElementById('stage').addEventListener('click',e=>{if(state.device==='mobile'&&e.target.closest('.screen')&&!e.target.closest('.sheet')&&!e.target.closest('.m-top')&&!e.target.closest('.m-bot')){state.overlay=!state.overlay;render();}});
render();
</script>
</body>
</html>
